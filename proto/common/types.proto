syntax = "proto3";

package uchome.common;

import "google/protobuf/timestamp.proto";


option go_package = "github.com/kongken/go-home/pkg/proto/common;common";

// 分页请求
message Pagination {
  int32 page = 1; // 页码，从1开始
  int32 page_size = 2; // 每页数量，默认20
  string cursor = 3; // 游标分页（可选）
}

// 分页响应
message PaginationResponse {
  int32 total = 1; // 总记录数
  int32 page = 2; // 当前页码
  int32 page_size = 3; // 每页数量
  bool has_more = 4; // 是否有更多
  string next_cursor = 5; // 下一页游标
}

// 隐私设置
enum PrivacyLevel {
  PRIVACY_PUBLIC = 0; // 公开
  PRIVACY_FRIENDS = 1; // 好友可见
  PRIVACY_PRIVATE = 2; // 仅自己
  PRIVACY_CUSTOM = 3; // 自定义分组
}

// 时间范围
message TimeRange {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
}

// 地理位置
message Location {
  double latitude = 1; // 纬度
  double longitude = 2; // 经度
  string address = 3; // 地址描述
  string city = 4; // 城市
  string province = 5; // 省份
}

// 媒体附件
message MediaAttachment {
  enum MediaType {
    IMAGE = 0;
    VIDEO = 1;
    AUDIO = 2;
    FILE = 3;
  }
  string id = 1;
  MediaType type = 2;
  string url = 3; // 访问URL
  string thumbnail = 4; // 缩略图URL
  int64 size = 5; // 文件大小（字节）
  int32 width = 6; // 宽度（图片/视频）
  int32 height = 7; // 高度（图片/视频）
  int32 duration = 8; // 时长（视频/音频，秒）
}
